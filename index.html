<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Mini Fashion Store</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f8f8f8;
      text-align: center;
    }

    header {
      background: black;
      color: white;
      padding: 15px;
    }

    .container {
      padding: 20px;
    }

    .product {
      background: white;
      margin: 15px auto;
      padding: 15px;
      width: 250px;
      border-radius: 15px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.1);
    }

    .product img {
      width: 100%;
      border-radius: 10px;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 10px;
      width: 100%;
      background: black;
      color: white;
      border: none;
      border-radius: 8px;
      text-decoration: none;
    }

    .btn:hover {
      background: #333;
    }
  </style>
</head>

<body>

<header>
  <h2>🔥 toko baju Irvan</h2>
</header>

<div class="container">

  <!-- PRODUK 1 -->
  <div class="product">
    <img src="https://i.ibb.co/m5Ph05sw/OIP.jpg" alt="produk">
    <h3>Kemeja Casual</h3>
    <p>Rp150.000</p>
    <a class="btn" href="https://wa.me/6281234567890?text=Halo%20saya%20mau%20Kemeja%20Casual">
      Beli via WhatsApp
    </a>
  </div>

  <!-- PRODUK 2 -->
  <div class="product">
    <img src="https://i.ibb.co/GS3Fn1M/OIP-1.jpg" alt="produk">
    <h3>Dress Wanita</h3>
    <p>Rp200.000</p>
    <a class="btn" href="https://wa.me/6281234567890?text=Halo%20saya%20mau%20Dress%20Wanita">
      Beli via WhatsApp
    </a>
  </div>

</div>

</body>
</html>
